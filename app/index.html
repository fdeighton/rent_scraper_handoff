<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comp Tracker — Fitzrovia AI Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" />
  <!-- Leaflet + MarkerCluster (CDN). Load only when online; app degrades gracefully if absent. -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a class="sidebar__back" href="#/universe" aria-label="Fitzrovia — home">
        <img class="sidebar__logofull" src="fitzrovia-logo.png" alt="Fitzrovia" />
      </a>
      <nav class="sidebar__nav" id="nav"></nav>
    </aside>
    <main class="main">
      <div class="content" id="view"></div>
    </main>
  </div>

  <!-- Inlined data (window.COMP_DATA) so the page opens from file:// with no server -->
  <script src="data.js"></script>
  <!-- Dependency-free real .xlsx writer (window.XlsxLite) used by the Excel exports -->
  <script src="xlsx.js"></script>
  <script src="app.js"></script>
</body>
</html>
