<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comp Tracker — Fitzrovia AI Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" />
  <!-- Leaflet + MarkerCluster (CDN). Load only when online; app degrades gracefully if absent.
       SRI-pinned (integrity) so a compromised/MITM'd CDN can't inject script. -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
        integrity="sha384-pmjIAcz2bAn0xukfxADbZIb3t8oRT9Sv0rvO+BR5Csr6Dhqq+nZs59P0pPKQJkEV" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
        integrity="sha384-wgw+aLYNQ7dlhK47ZPK7FRACiq7ROZwgFNg0m04avm4CaXS+Z9Y7nMu8yNjBKYC+" crossorigin="anonymous" />
  <script>
    (() => {
      try {
        const key = "comp_theme_v1";
        const saved = localStorage.getItem(key);
        document.documentElement.dataset.theme = saved === "dark" ? "dark" : "light";
      } catch (_) {}
    })();
  </script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
          integrity="sha384-eXVCORTRlv4FUUgS/xmOyr66XBVraen8ATNLMESp92FKXLAMiKkerixTiBvXriZr" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__head">
        <a class="sidebar__back" href="#/universe" aria-label="Fitzrovia — home">
          <img class="sidebar__logofull" src="fitzrovia-logo.png" alt="Fitzrovia" />
        </a>
        <button class="sidebar__toggle" id="sb-toggle" aria-label="Collapse sidebar" title="Collapse sidebar"></button>
      </div>
      <nav class="sidebar__nav" id="nav"></nav>
      <div class="sidebar__foot">
        <button class="theme-toggle" id="theme-toggle" type="button"></button>
      </div>
    </aside>
    <main class="main">
      <div class="content" id="view"></div>
    </main>
  </div>

  <!-- Data-source switch (window.COMP_CONFIG): inline data.js (default) or a backend URL -->
  <script src="config.js"></script>
  <!-- Real agent loop (window.SBScrape): enqueue/poll/read via Supabase. supabase-js is
       lazy-loaded from CDN only when a real scrape runs; mock preview otherwise. -->
  <script src="supabase-scrape.js"></script>
  <!-- Inlined data (window.COMP_DATA) so the page opens from file:// with no server -->
  <script src="data.js"></script>
  <!-- Dependency-free real .xlsx writer (window.XlsxLite) used by the Excel exports -->
  <script src="xlsx.js"></script>
  <script src="app.js"></script>
</body>
</html>
