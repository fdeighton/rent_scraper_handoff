<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"><style>
body { padding: 24px; background: #FFFFFF; }
.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.row:last-child { margin-bottom: 0; }
.badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.b-success { background: #E4F2EC; color: #1F8A5B; }
.b-warn { background: #FBEFD9; color: #C77A0F; }
.b-danger { background: #FFE6E0; color: #FF4E31; }
.b-info { background: #D6DFFA; color: #2A6FDB; }
.b-neutral { background: #F2F2EF; color: #4A4A47; }
.chip { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 500; border: 1px solid #E1E1DC; color: #061031; background: #FFFFFF; }
.chip.active { background: #FF4E31; color: #FFFFFF; border-color: #FF4E31; }
</style></head>
<body>
<div class="row">
  <span class="badge b-success"><span class="dot" style="background:#1F8A5B"></span>Closed</span>
  <span class="badge b-warn"><span class="dot" style="background:#C77A0F"></span>In Progress</span>
  <span class="badge b-danger"><span class="dot" style="background:#FF4E31"></span>Critical</span>
  <span class="badge b-info"><span class="dot" style="background:#2A6FDB"></span>Open</span>
  <span class="badge b-neutral"><span class="dot" style="background:#7F7F7F"></span>Draft</span>
  <span class="badge" style="background:#FFE6E0;color:#FF4E31;font-weight:600;letter-spacing:0.04em;font-size:10px;text-transform:uppercase">New</span>
</div>
<div class="row">
  <span class="chip active">All</span>
  <span class="chip">Toronto</span>
  <span class="chip">Montreal</span>
  <span class="chip">Vancouver</span>
</div>
</body></html>
