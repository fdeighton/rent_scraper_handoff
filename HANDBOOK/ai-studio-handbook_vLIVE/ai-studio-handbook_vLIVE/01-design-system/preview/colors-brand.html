<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"><style>
.brand-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.swatch-chip.orange { background: #FF4E31; }
.swatch-chip.navy { background: #061031; }
.swatch-chip.blue { background: #D6DFFA; border-color: #C9D2EC; }
.swatch-chip.grey { background: #7F7F7F; }
.usage { font-size: 11px; color: var(--fg-muted); line-height: 1.45; }
</style></head>
<body>
<div class="brand-grid">
  <div class="swatch"><div class="swatch-chip orange"></div><div class="swatch-name">Orange</div><div class="swatch-hex">#FF4E31</div><div class="usage">Accent — sparingly. CTAs, key callouts, active states.</div></div>
  <div class="swatch"><div class="swatch-chip navy"></div><div class="swatch-name">Dark Navy</div><div class="swatch-hex">#061031</div><div class="usage">Primary text, headers, sidebars. Dominant.</div></div>
  <div class="swatch"><div class="swatch-chip blue"></div><div class="swatch-name">Light Blue</div><div class="swatch-hex">#D6DFFA</div><div class="usage">Surface tinting, callouts, decorative accents.</div></div>
  <div class="swatch"><div class="swatch-chip grey"></div><div class="swatch-name">Dark Grey</div><div class="swatch-hex">#7F7F7F</div><div class="usage">Secondary text, captions, disabled.</div></div>
</div>
</body></html>
