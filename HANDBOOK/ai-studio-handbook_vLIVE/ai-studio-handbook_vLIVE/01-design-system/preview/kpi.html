<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"><style>
body { padding: 24px; background: #FAFAF7; }
.strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.kpi {
  background: #FFFFFF; border: 1px solid #E6E6E1; border-radius: 8px;
  padding: 16px 18px;
  box-shadow: 0 1px 2px rgba(6,16,49,0.04);
}
.kpi .v { font-size: 22px; font-weight: 600; color: #061031; line-height: 1.2; }
.kpi .v .accent { color: #FF4E31; }
.kpi .lbl { font-size: 12px; color: #7F7F7F; margin-top: 4px; }
.kpi .arrow { color: #FF4E31; font-weight: 500; }
</style></head>
<body>
<div class="strip">
  <div class="kpi"><div class="v">6,497</div><div class="lbl">Total Work Orders <span class="arrow">↗</span></div></div>
  <div class="kpi"><div class="v"><span class="accent">1,333 (20.5%)</span></div><div class="lbl">3rd Party WOs <span class="arrow">↗</span></div></div>
  <div class="kpi"><div class="v"><span class="accent">271 (4.2%)</span></div><div class="lbl">Unassigned WOs <span class="arrow">↗</span></div></div>
</div>
</body></html>
