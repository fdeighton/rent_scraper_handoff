<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"><style>
body { padding: 24px; background: #FAFAF7; }
.alert {
  background: #FFFFFF; border: 1px solid #E6E6E1; border-left: 3px solid #FF4E31;
  border-radius: 6px; padding: 14px 18px;
  display: flex; flex-direction: column; gap: 4px;
}
.alert h4 { font-size: 14px; font-weight: 600; color: #061031; margin: 0; }
.alert .body { font-size: 13px; color: #4A4A47; }
.alert .body .name { color: #061031; font-weight: 500; }
.alert .action { font-size: 13px; color: #FF4E31; font-weight: 500; }
</style></head>
<body>
<div class="alert">
  <h4>Technician with 0 closures in last 30 days</h4>
  <div class="body"><span class="name">Justin Bonilla:</span> 2,699 total WOs but 0 closed in last 30 days</div>
  <div class="action">Verify technician status — may need workload redistribution</div>
</div>
</body></html>
