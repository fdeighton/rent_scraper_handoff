<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"><style>
.grid7 { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
.swatch-chip.s-paper { background: #FAFAF7; }
.swatch-chip.s-surface { background: #FFFFFF; }
.swatch-chip.s-alt { background: #F5F5F2; }
.swatch-chip.s-100 { background: #F2F2EF; }
.swatch-chip.s-200 { background: #E1E1DC; }
.swatch-chip.s-400 { background: #B5B5AF; }
.swatch-chip.s-800 { background: #4A4A47; }
</style></head>
<body>
<div class="grid7">
  <div class="swatch"><div class="swatch-chip s-paper"></div><div class="swatch-name">paper</div><div class="swatch-hex">#FAFAF7</div></div>
  <div class="swatch"><div class="swatch-chip s-surface"></div><div class="swatch-name">surface</div><div class="swatch-hex">#FFFFFF</div></div>
  <div class="swatch"><div class="swatch-chip s-alt"></div><div class="swatch-name">surface-alt</div><div class="swatch-hex">#F5F5F2</div></div>
  <div class="swatch"><div class="swatch-chip s-100"></div><div class="swatch-name">grey-100</div><div class="swatch-hex">#F2F2EF</div></div>
  <div class="swatch"><div class="swatch-chip s-200"></div><div class="swatch-name">grey-200</div><div class="swatch-hex">#E1E1DC</div></div>
  <div class="swatch"><div class="swatch-chip s-400"></div><div class="swatch-name">grey-400</div><div class="swatch-hex">#B5B5AF</div></div>
  <div class="swatch"><div class="swatch-chip s-800"></div><div class="swatch-name">grey-800</div><div class="swatch-hex">#4A4A47</div></div>
</div>
</body></html>
